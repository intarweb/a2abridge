name: release

# Triggered on tags vX.Y.Z. Cross-compiles a2abridge for the supported
# os/arch matrix, packs each artifact, then a single aggregating job
# generates checksums.txt and attaches everything to the GitHub Release.
# install.sh / install.ps1 and the CLI self-updater verify downloads
# against checksums.txt.

on:
  push:
    tags: ['v*']

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - { goos: darwin,  goarch: amd64, ext: tar.gz }
          - { goos: darwin,  goarch: arm64, ext: tar.gz }
          - { goos: linux,   goarch: amd64, ext: tar.gz }
          - { goos: linux,   goarch: arm64, ext: tar.gz }
          - { goos: windows, goarch: amd64, ext: zip    }
          - { goos: windows, goarch: arm64, ext: zip    }
    env:
      GOOS:   ${{ matrix.goos }}
      GOARCH: ${{ matrix.goarch }}
      CGO_ENABLED: '0'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with: { go-version: '1.25' }

      - name: derive ldflags
        id: ld
        run: |
          ver="${GITHUB_REF_NAME#v}"
          sha="$(git rev-parse --short HEAD)"
          date="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          echo "ldflags=-s -w \
            -X github.com/vbcherepanov/a2abridge/internal/buildinfo.Version=${ver} \
            -X github.com/vbcherepanov/a2abridge/internal/buildinfo.Commit=${sha} \
            -X github.com/vbcherepanov/a2abridge/internal/buildinfo.BuildDate=${date}" >> "$GITHUB_OUTPUT"

      - name: build
        run: |
          out="a2abridge"
          [ "$GOOS" = "windows" ] && out="a2abridge.exe"
          mkdir -p dist
          go build -trimpath -ldflags "${{ steps.ld.outputs.ldflags }}" -o "dist/$out" ./cmd/a2abridge

      - name: pack
        run: |
          ver="${GITHUB_REF_NAME#v}"
          base="a2abridge_${ver}_${GOOS}_${GOARCH}"
          cd dist
          if [ "${{ matrix.ext }}" = "zip" ]; then
            zip -9 "${base}.zip" a2abridge.exe
          else
            tar -czf "${base}.tar.gz" a2abridge
          fi
          ls -la

      - uses: actions/upload-artifact@v4
        with:
          name: dist-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/a2abridge_*
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      # checksums.txt format: "<sha256-hex>  <filename>" (two spaces) —
      # the exact layout `sha256sum -c` and the installers expect.
      - name: generate checksums.txt
        run: |
          cd dist
          sha256sum a2abridge_* > checksums.txt
          cat checksums.txt

      - uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2.6.2
        with:
          files: |
            dist/a2abridge_*
            dist/checksums.txt
