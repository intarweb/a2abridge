# docker-compose.yml — directory daemon(s) for local testing.
#
# A real `a2abridge bridge` needs an MCP stdio peer (Claude / Codex /
# Cursor) attached to its stdin/stdout, which is not how containers run —
# so this stack ships directory instances only. Point bridges running on
# the host (or in other containers with a stdio peer) at
# http://127.0.0.1:7777.
#
# Security note: the directory binds 0.0.0.0 INSIDE the container; the
# host port mapping is pinned to 127.0.0.1 so it is not reachable from
# the network. Keep it that way unless you add mTLS federation — see
# SECURITY.md (the /metrics endpoint included).

services:
  directory:
    image: ghcr.io/vbcherepanov/a2abridge:latest
    container_name: a2abridge-directory
    command: ["directory", "-addr", "0.0.0.0:7777"]
    ports:
      - "127.0.0.1:7777:7777"
    restart: unless-stopped

  # A second, independent directory — handy for testing directory
  # failover / multi-directory client behaviour. Remove if you only
  # need one.
  directory-secondary:
    image: ghcr.io/vbcherepanov/a2abridge:latest
    container_name: a2abridge-directory-secondary
    command: ["directory", "-addr", "0.0.0.0:7778"]
    ports:
      - "127.0.0.1:7778:7778"
    restart: unless-stopped
